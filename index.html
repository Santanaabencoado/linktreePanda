<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Garimpeiro | Meus Links</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Variáveis de Cores e Estilos */
        :root {
            --bg-gradient: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --text-main: #2d3436;
            --text-muted: #636e72;
            --card-bg: rgba(255, 255, 255, 0.85);
            --btn-bg: #ffffff;
            --btn-hover: #fff3e0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Animação suave do fundo */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 20px;
            box-shadow: var(--shadow);
            text-align: center;
            animation: slideUpFade 0.8s ease-out forwards;
        }

        /* Animação de entrada do container */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Perfil */
        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            margin-bottom: 15px;
            transition: var(--transition);
        }

        .profile-pic:hover {
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Ícones Sociais Menores (Topo) */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-icons a {
            color: var(--text-main);
            font-size: 1.5rem;
            transition: var(--transition);
            display: inline-block;
        }

        .social-icons a:hover {
            color: #ff6b6b;
            transform: translateY(-3px) scale(1.1);
        }

        /* Links Principais (Botões) */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--btn-bg);
            color: var(--text-main);
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: var(--transition);
            overflow: hidden; /* Necessário para o efeito ripple */
            opacity: 0;
            animation: fadeInBtn 0.5s ease-out forwards;
        }

        /* Staggered animation para os botões aparecerem um por um */
        .link-btn:nth-child(1) { animation-delay: 0.2s; }
        .link-btn:nth-child(2) { animation-delay: 0.3s; }
        .link-btn:nth-child(3) { animation-delay: 0.4s; }
        .link-btn:nth-child(4) { animation-delay: 0.5s; }
        .link-btn:nth-child(5) { animation-delay: 0.6s; }

        @keyframes fadeInBtn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background: var(--btn-hover);
        }

        .link-btn i.icon-left {
            font-size: 1.3rem;
            width: 30px;
            text-align: left;
        }

        .link-btn .btn-text {
            flex-grow: 1;
            text-align: center;
        }

        .link-btn i.icon-right {
            font-size: 1rem;
            color: #b2bec3;
            transition: transform 0.3s ease;
        }

        .link-btn:hover i.icon-right {
            transform: translateX(3px);
            color: var(--text-main);
        }

        /* Efeito Ripple (JavaScript) */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            background-color: rgba(255, 107, 107, 0.3);
        }

        @keyframes ripple-animation {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="panda.jpg" alt="Avatar Panda Garimpeiro" class="profile-pic">
            
            <h1>Panda Garimpeiro 🐼</h1>
            <p class="bio">
                🚨 Os achadinhos MAIS baratos da Shopee <br>  😱 Produtos que viralizaram no TikTok <br>💰
                Economize sem abrir mão da qualidade 👇
            </p>

            <div class="social-icons">
                <a href="https://www.tiktok.com/@modomilionario.ofc0?_r=1" target="_blank" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
                <a href="https://chat.whatsapp.com/Ez1hA6VS42G9lZHgXpRwk5?mode=gi_t" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.instagram.com/panda_garimpeiro?igsh=MXN3NDhjMmY3bDc1dw%3D%3D&utm_source=qr" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
        </header>

        <main class="links-container">
            <a href="https://collshp.com/santanadg65?view=storefront" class="link-btn" target="_blank">
                <i class="fas fa-store icon-left" style="color: #ff5e00;"></i>
                <span class="btn-text">Vitrine na Shopee</span>
                <i class="fas fa-ellipsis-v icon-right"></i>
            </a>

            <a href="https://chat.whatsapp.com/Ez1hA6VS42G9lZHgXpRwk5?mode=gi_t" class="link-btn" target="_blank">
                <i class="fab fa-whatsapp icon-left" style="color: #25D366;"></i>
                <span class="btn-text">Grupo VIP WhatsApp</span>
                <i class="fas fa-ellipsis-v icon-right"></i>
            </a>

            <a href="https://www.tiktok.com/@modomilionario.ofc0?_r=1" class="link-btn" target="_blank">
                <i class="fab fa-tiktok icon-left" style="color: #000000;"></i>
                <span class="btn-text">TikTok</span>
                <i class="fas fa-ellipsis-v icon-right"></i>
            </a>

            <a href="https://www.instagram.com/panda_garimpeiro?igsh=MXN3NDhjMmY3bDc1dw%3D%3D&utm_source=qr" class="link-btn" target="_blank">
                <i class="fab fa-instagram icon-left" style="color: #E1306C;"></i>
                <span class="btn-text">Instagram</span>
                <i class="fas fa-ellipsis-v icon-right"></i>
            </a>

            <a href="https://santanaabencoado.github.io/pandagarimpeiro/" class="link-btn" target="_blank">
                <i class="fas fa-globe icon-left" style="color: #0984e3;"></i>
                <span class="btn-text">Site Oficial</span>
                <i class="fas fa-ellipsis-v icon-right"></i>
            </a>
        </main>
    </div>

    <script>
        const buttons = document.querySelectorAll('.link-btn');

        buttons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                // Cria o elemento span para o ripple
                let ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);

                // Calcula a posição do clique
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;

                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;

                // Remove o span após a animação
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });
    </script>
</body>
</html>
